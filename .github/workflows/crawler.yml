name: Daily Gold Data Crawler

on:
  schedule:
    - cron: "0 17 * * *"
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests beautifulsoup4 pandas lxml yfinance

      - name: Run crawler
        run: python crawler.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/gold_dataset_v2.csv
          git diff --cached --quiet || git commit -m "auto: update gold data $(date -u '+%Y-%m-%d')"
          git push